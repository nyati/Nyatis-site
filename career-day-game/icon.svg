    <ellipse cx="0" cy="46" rx="92" ry="10" fill="rgba(11,35,63,0.18)"/>
    <rect x="-86" y="-34" width="172" height="62" rx="22" fill="#1A3A6B"/>
    <rect x="-56" y="-54" width="106" height="32" rx="12" fill="#A8D0F0"/>
    <rect x="-6" y="-54" width="6" height="32" fill="#1A3A6B"/>
    <rect x="58" y="-16" width="30" height="8" rx="4" fill="#FCE300"/>
    <circle cx="-50" cy="30" r="18" fill="#1a1a1a"/>
    <circle cx="50" cy="30" r="18" fill="#1a1a1a"/>
    <circle cx="-50" cy="30" r="8" fill="#888"/>
    <circle cx="50" cy="30" r="8" fill="#888"/>
