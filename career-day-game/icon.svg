<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#B0E0E6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#sky)"/>
  <!-- Cloud -->
  <g transform="translate(140 150)" fill="#ffffff" stroke="rgba(11,35,63,0.18)" stroke-width="4">
    <circle cx="-40" cy="6" r="34"/>
    <circle cx="-4" cy="-18" r="40"/>
    <circle cx="36" cy="0" r="34"/>
    <circle cx="2" cy="22" r="30"/>
  </g>
  <!-- Dashed path -->
  <path d="M 160 180 Q 260 320 360 360" stroke="#0B233F" stroke-width="6" fill="none" stroke-dasharray="14 14" stroke-linecap="round"/>
  <path d="M 160 180 Q 260 320 360 360" stroke="rgba(252,227,0,0.45)" stroke-width="48" fill="none" stroke-linecap="round"/>
  <path d="M 160 180 Q 260 320 360 360" stroke="#0B233F" stroke-width="6" fill="none" stroke-dasharray="14 14" stroke-linecap="round"/>
  <!-- Package -->
  <g transform="translate(245 270)">
